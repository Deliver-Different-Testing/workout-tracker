<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Workout Tracker</title>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --accent: #e94560;
  --accent2: #0f3460;
  --text: #eee;
  --text2: #999;
  --green: #4ade80;
  --yellow: #fbbf24;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:80px; -webkit-tap-highlight-color:transparent; }
.page { display:none; padding:16px; max-width:500px; margin:0 auto; }
.page.active { display:block; }

nav { position:fixed; bottom:0; left:0; right:0; background:var(--surface); display:flex; border-top:1px solid #333; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
nav button { flex:1; padding:10px 4px; background:none; border:none; color:var(--text2); font-size:10px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; }
nav button.active { color:var(--accent); }
nav button .icon { font-size:20px; }

h1 { font-size:22px; margin-bottom:16px; }
h2 { font-size:17px; margin-bottom:12px; color:var(--text2); }

.card { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.card-title { font-size:15px; font-weight:600; margin-bottom:8px; }

input, select, textarea { width:100%; padding:12px; background:var(--surface2); border:1px solid #333; border-radius:8px; color:var(--text); font-size:16px; margin-bottom:8px; -webkit-appearance:none; }
input:focus, select:focus, textarea:focus { outline:none; border-color:var(--accent); }
textarea { resize:vertical; min-height:60px; font-size:14px; }
label { display:block; font-size:13px; color:var(--text2); margin-bottom:4px; }

.btn { display:inline-flex; align-items:center; justify-content:center; padding:12px 20px; border-radius:8px; border:none; font-size:15px; font-weight:600; cursor:pointer; width:100%; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-secondary { background:var(--surface2); color:var(--text); border:1px solid #444; }
.btn-sm { padding:8px 12px; font-size:13px; width:auto; }
.btn-danger { background:#dc2626; color:#fff; }
.btn-icon { background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; padding:4px; width:auto; }
.btn-ghost { background:none; border:1px dashed #444; color:var(--text2); padding:8px; border-radius:8px; width:100%; cursor:pointer; font-size:13px; }

.exercise-record { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.exercise-record .ex-name { font-size:16px; font-weight:600; margin-bottom:4px; }
.exercise-record .ex-notes { font-size:12px; color:var(--text2); margin-bottom:12px; }
.set-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.set-row .set-num { width:28px; text-align:center; font-size:13px; color:var(--text2); flex-shrink:0; }
.set-row input { width:72px; text-align:center; margin-bottom:0; padding:10px 6px; }
.set-row .check { width:36px; height:36px; border-radius:50%; border:2px solid #444; background:none; color:var(--text2); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.set-row .check.done { border-color:var(--green); color:var(--green); background:rgba(74,222,128,0.1); }

.prev-data { font-size:12px; color:var(--text2); margin-bottom:8px; background:rgba(15,52,96,0.3); padding:8px; border-radius:6px; }
.prev-data strong { color:var(--yellow); }

.mini-chart { height:80px; display:flex; align-items:flex-end; gap:3px; padding:4px 0; }
.mini-bar { flex:1; border-radius:3px 3px 0 0; min-width:8px; max-width:24px; position:relative; }
.mini-bar .tip { position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:9px; color:var(--text2); white-space:nowrap; }
.trend-stats { display:flex; gap:12px; margin-top:8px; flex-wrap:wrap; }
.trend-stat { font-size:12px; color:var(--text2); }
.trend-stat span { color:var(--text); font-weight:600; }

.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:flex-end; justify-content:center; }
.modal-bg.show { display:flex; }
.modal { background:var(--surface); border-radius:16px 16px 0 0; padding:24px 16px; width:100%; max-width:500px; max-height:85vh; overflow-y:auto; padding-bottom:calc(24px + env(safe-area-inset-bottom)); }
.modal h2 { margin-bottom:16px; }
.modal-actions { display:flex; gap:8px; margin-top:16px; }
.modal-actions .btn { flex:1; }

.empty { text-align:center; padding:40px 20px; color:var(--text2); }
.empty .icon { font-size:48px; margin-bottom:12px; }

.rest-timer { position:fixed; top:0; left:0; right:0; background:var(--accent); color:#fff; text-align:center; padding:8px; font-size:18px; font-weight:700; z-index:150; display:none; }
.rest-timer.show { display:block; }

.metric-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.metric-card { background:var(--surface); border-radius:var(--radius); padding:14px; text-align:center; }
.metric-card .value { font-size:24px; font-weight:700; }
.metric-card .label { font-size:11px; color:var(--text2); margin-top:2px; }
.metric-card .change { font-size:11px; margin-top:4px; }

.activity-pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.activity-pill { padding:8px 16px; border-radius:20px; border:1px solid #444; background:none; color:var(--text2); font-size:13px; cursor:pointer; }
.activity-pill.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.activity-pill.pilates.active { background:var(--purple); border-color:var(--purple); }
.activity-pill.walk.active { background:var(--green); border-color:var(--green); color:#000; }

.week-view { display:flex; gap:4px; margin-bottom:16px; }
.week-day { flex:1; text-align:center; padding:8px 4px; border-radius:8px; background:var(--surface); }
.week-day .day-label { font-size:10px; color:var(--text2); }
.week-day .day-dots { margin-top:4px; display:flex; gap:2px; justify-content:center; flex-wrap:wrap; }
.dot { width:8px; height:8px; border-radius:50%; }
.dot-gym { background:var(--accent); }
.dot-pilates { background:var(--purple); }
.dot-walk { background:var(--green); }

.tabs { display:flex; gap:4px; margin-bottom:16px; background:var(--surface); border-radius:8px; padding:4px; }
.tab { flex:1; padding:8px; text-align:center; border-radius:6px; border:none; background:none; color:var(--text2); font-size:13px; cursor:pointer; }
.tab.active { background:var(--accent); color:#fff; }

/* Workout selector pills */
.workout-pills { display:flex; gap:8px; margin-bottom:12px; overflow-x:auto; padding-bottom:4px; }
.workout-pill { padding:10px 18px; border-radius:20px; border:2px solid #444; background:none; color:var(--text); font-size:14px; cursor:pointer; white-space:nowrap; flex-shrink:0; font-weight:600; }
.workout-pill.active { border-color:var(--accent); background:var(--accent); color:#fff; }

/* Checkbox list */
.check-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #222; }
.check-item:last-child { border-bottom:none; }
.check-item input[type=checkbox] { width:20px; height:20px; margin:0; flex-shrink:0; }
.check-item label { margin:0; font-size:14px; color:var(--text); flex:1; }
</style>
</head>
<body>

<div class="rest-timer" id="restTimer"></div>

<!-- HOME / DASHBOARD -->
<div class="page active" id="pageHome">
  <h1>💪 Workout Tracker</h1>
  <div id="weekStreak"></div>
  <div id="latestMetrics"></div>
  <h2>Log Activity</h2>
  <div class="activity-pills" id="todayActivities">
    <button class="activity-pill pilates" onclick="logActivity('pilates')">🧘 Pilates</button>
    <button class="activity-pill walk" onclick="logActivity('walk')">🐕 Dog Walk</button>
  </div>
  <h2>Start Workout</h2>
  <div id="homeWorkoutButtons"></div>
  <div id="todayLog" style="margin-top:12px"></div>
  <button class="btn btn-secondary" style="margin-top:8px" onclick="switchPage('Body',2)">⚖️ Log Body Metrics</button>
  <div id="ouraHome" style="margin-top:16px"></div>
</div>

<!-- RECORD PAGE -->
<div class="page" id="pageRecord">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h1 id="recordTitle">🏋️ Record</h1>
    <button class="btn btn-sm btn-secondary" onclick="finishWorkout()">Finish ✓</button>
  </div>
  <input type="date" id="workoutDate" onchange="loadWorkoutForDate()">
  <div class="workout-pills" id="workoutPills"></div>
  <div id="recordList"></div>
</div>

<!-- BODY METRICS PAGE -->
<div class="page" id="pageBody">
  <h1>⚖️ Body Metrics</h1>
  <div id="btConnectArea">
    <button class="btn btn-secondary" onclick="connectTanita()" style="margin-bottom:12px">📡 Connect Tanita Scales</button>
    <div id="btStatus" style="font-size:12px;color:var(--text2);margin-bottom:12px"></div>
  </div>
  <div class="card">
    <label>Date</label>
    <input type="date" id="bodyDate">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><label>Weight (kg)</label><input type="number" inputmode="decimal" step="0.1" id="bodyWeight" placeholder="85.0"></div>
      <div><label>Body Fat %</label><input type="number" inputmode="decimal" step="0.1" id="bodyFat" placeholder="22.0"></div>
      <div><label>Visceral Fat</label><input type="number" inputmode="decimal" step="1" id="bodyVisceral" placeholder="8"></div>
      <div><label>Muscle Mass (kg)</label><input type="number" inputmode="decimal" step="0.1" id="bodyMuscle" placeholder="65.0"></div>
    </div>
    <button class="btn btn-primary" onclick="saveBodyMetrics()" style="margin-top:8px">Save</button>
  </div>
  <h2 style="margin-top:16px">History</h2>
  <div id="bodyHistory"></div>
</div>

<!-- TRENDS PAGE -->
<div class="page" id="pageTrends">
  <h1>📈 Trends</h1>
  <div class="tabs">
    <button class="tab active" onclick="showTrendTab('weights',this)">Weights</button>
    <button class="tab" onclick="showTrendTab('body',this)">Body</button>
    <button class="tab" onclick="showTrendTab('activity',this)">Activity</button>
    <button class="tab" onclick="showTrendTab('oura',this)">Oura</button>
  </div>
  <div id="trendsWeights"></div>
  <div id="trendsBody" style="display:none"></div>
  <div id="trendsActivity" style="display:none"></div>
  <div id="trendsOura" style="display:none"></div>
</div>

<!-- SETUP PAGE -->
<div class="page" id="pageSetup">
  <h1>⚙️ Setup</h1>
  
  <h2>Workouts</h2>
  <div id="workoutList"></div>
  <button class="btn btn-primary" onclick="openAddWorkout()" style="margin-top:8px;margin-bottom:20px">+ Add Workout</button>

  <h2>All Exercises</h2>
  <div id="exerciseList"></div>
  <button class="btn btn-primary" onclick="openAddExercise()" style="margin-top:8px">+ Add Exercise</button>
  <div style="margin-top:12px">
    <button class="btn btn-secondary" onclick="loadDefaults()">Load Steve's Program</button>
  </div>

  <h2 style="margin-top:24px">Rest Timer (seconds)</h2>
  <input type="number" id="restTimerSetting" value="90" onchange="DB.set('restTimer',parseInt(this.value)||90)">
  <h2 style="margin-top:16px">Data</h2>
  <button class="btn btn-secondary" onclick="alert('Data now saved to server!')" style="margin-bottom:8px">📤 Export Data (N/A)</button>
  <button class="btn btn-secondary" onclick="alert('Data now managed by server!')">📥 Import Data (N/A)</button>
</div>

<!-- NAV -->
<nav>
  <button class="active" onclick="switchPage('Home',0)"><span class="icon">🏠</span>Home</button>
  <button onclick="switchPage('Record',1)"><span class="icon">🏋️</span>Record</button>
  <button onclick="switchPage('Body',2)"><span class="icon">⚖️</span>Body</button>
  <button onclick="switchPage('Trends',3)"><span class="icon">📈</span>Trends</button>
  <button onclick="switchPage('Setup',4)"><span class="icon">⚙️</span>Setup</button>
</nav>

<!-- ADD/EDIT EXERCISE MODAL -->
<div class="modal-bg" id="exerciseModal">
  <div class="modal">
    <h2 id="modalTitle">Add Exercise</h2>
    <label>Exercise Name</label>
    <input id="exName" placeholder="e.g. Bench Press">
    <label>Notes / Form Cues</label>
    <textarea id="exNotes" placeholder="e.g. Keep shoulders back on the ball"></textarea>
    <label>Default Sets</label>
    <input id="exSets" type="number" value="2" min="1" max="10">
    <label>Target Reps</label>
    <input id="exReps" type="number" value="10" min="1" max="100">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('exerciseModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveExercise()">Save</button>
    </div>
    <div id="deleteExBtn" style="margin-top:12px;display:none">
      <button class="btn btn-danger" onclick="deleteExercise()">Delete Exercise</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT WORKOUT MODAL -->
<div class="modal-bg" id="workoutModal">
  <div class="modal">
    <h2 id="workoutModalTitle">Add Workout</h2>
    <label>Workout Name</label>
    <input id="wkName" placeholder="e.g. Upper Body A">
    <label style="margin-top:8px">Exercises</label>
    <div id="wkExerciseList"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('workoutModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveWorkout()">Save</button>
    </div>
    <div id="deleteWkBtn" style="margin-top:12px;display:none">
      <button class="btn btn-danger" onclick="deleteWorkout()">Delete Workout</button>
    </div>
  </div>
</div>

<!-- ACTIVITY LOG MODAL -->
<div class="modal-bg" id="activityModal">
  <div class="modal">
    <h2 id="activityModalTitle">Log Activity</h2>
    <label>Date</label>
    <input type="date" id="actDate">
    <label>Duration (minutes)</label>
    <input type="number" id="actDuration" inputmode="numeric" placeholder="45">
    <label>Notes (optional)</label>
    <textarea id="actNotes" placeholder="e.g. Morning session, focused on core"></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('activityModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveActivity()">Save</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://workout-api-production-f340.up.railway.app/api';

async function apiFetch(method, endpoint, data) {
  const options = {
    method: method,
    headers: { 'Content-Type': 'application/json' }
  };
  if (data) options.body = JSON.stringify(data);
  const r = await fetch(`${API_URL}${endpoint}`, options);
  if (!r.ok) throw new Error(`API error: ${r.statusText}`);
  return r.json();
}

// Global state (now reflects server data)
let exercises = [];
let programs = [];
let activeProgram = null;

const today = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

// --- NAVIGATION ---
async function switchPage(name, idx) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page'+name).classList.add('active');
  document.querySelectorAll('nav button').forEach((b,i) => b.classList.toggle('active', i===idx));
  
  // Refresh data based on page
  if (name==='Home') await renderHome();
  if (name==='Record') await initRecord();
  if (name==='Body') await initBody();
  if (name==='Trends') await renderTrends();
  if (name==='Setup') { await fetchAllSetupData(); renderExercises(); renderWorkoutList(); }
}

// --- GENERAL DATA FETCH FOR PAGES ---
async function fetchAllSetupData() {
  exercises = await apiFetch('GET', '/exercises');
  programs = await apiFetch('GET', '/programs');
}

// --- HOME ---
async function renderHome() {
  await fetchAllSetupData();
  const workoutsData = await apiFetch('GET', '/workouts');
  const activitiesData = await apiFetch('GET', '/activities');
  const bodyMetricsData = await apiFetch('GET', '/body-metrics');
  
  renderWeekStreak(workoutsData, activitiesData);
  renderLatestMetrics(bodyMetricsData);
  renderOuraHome(); // Oura pulls its own data
  renderHomeWorkouts();
  renderTodayLog(workoutsData, activitiesData);
  highlightTodayActivities(activitiesData, workoutsData);
}

function renderHomeWorkouts() {
  const el = document.getElementById('homeWorkoutButtons');
  if(!programs.length) {
    el.innerHTML = '<div style="font-size:13px;color:var(--text2)">Set up workouts in ⚙️ Setup first</div>';
    return;
  }
  el.innerHTML = programs.map(p => 
    `<button class="btn btn-primary" style="margin-bottom:8px" onclick="startWorkout('${p.id}')">🏋️ ${p.name}</button>`
  ).join('');
}

function startWorkout(programId) {
  activeProgram = programId;
  switchPage('Record', 1);
}

function renderWeekStreak(workoutsData, activitiesData) {
  const el = document.getElementById('weekStreak');
  const now = new Date();
  const dayOfWeek = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((dayOfWeek + 6) % 7));
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let html = '<div class="week-view">';
  for(let i=0; i<7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dayActs = activitiesData.filter(a => a.date === ds);
    const hasGymWorkout = workoutsData[ds] && workoutsData[ds].exercises && Object.keys(workoutsData[ds].exercises).length > 0;
    const isToday = ds === today();
    html += `<div class="week-day" style="${isToday?'border:1px solid var(--accent)':''}">
      <div class="day-label">${days[i]}</div>
      <div class="day-dots">
        ${hasGymWorkout ? '<div class="dot dot-gym"></div>' : ''}
        ${dayActs.some(a=>a.type==='pilates') ? '<div class="dot dot-pilates"></div>' : ''}
        ${dayActs.some(a=>a.type==='walk') ? '<div class="dot dot-walk"></div>' : ''}
      </div>
    </div>`;
  }
  el.innerHTML = html + '</div>';
}

function renderLatestMetrics(bodyMetricsData) {
  const el = document.getElementById('latestMetrics');
  if(!bodyMetricsData.length) { el.innerHTML=''; return; }
  const latest = bodyMetricsData[bodyMetricsData.length-1];
  const prev = bodyMetricsData.length > 1 ? bodyMetricsData[bodyMetricsData.length-2] : null;
  const ch = (curr, old, unit, inv) => {
    if(!prev || !old) return '';
    const diff = (curr - old).toFixed(1);
    const color = inv ? (diff<=0?'var(--green)':'var(--accent)') : (diff>=0?'var(--green)':'var(--accent)');
    return `<div class="change" style="color:${color}">${diff>0?'+':''}${diff}${unit}</div>`;
  };
  el.innerHTML = `<div class="metric-grid">
    ${latest.weight?`<div class="metric-card"><div class="value">${latest.weight}</div><div class="label">Weight (kg)</div>${ch(latest.weight,prev?.weight,'kg',true)}</div>`:''}
    ${latest.fat?`<div class="metric-card"><div class="value">${latest.fat}%</div><div class="label">Body Fat</div>${ch(latest.fat,prev?.fat,'%',true)}</div>`:''}
    ${latest.visceral?`<div class="metric-card"><div class="value">${latest.visceral}</div><div class="label">Visceral Fat</div>${ch(latest.visceral,prev?.visceral,'',true)}</div>`:''}
    ${latest.muscle?`<div class="metric-card"><div class="value">${latest.muscle}</div><div class="label">Muscle (kg)</div>${ch(latest.muscle,prev?.muscle,'kg',false)}</div>`:''}
  </div>`;
}

function highlightTodayActivities(activitiesData, workoutsData) {
  const t = today();
  document.querySelectorAll('#todayActivities .activity-pill').forEach(btn => {
    const type = btn.textContent.includes('Pilates')?'pilates':'walk';
    btn.classList.toggle('active', activitiesData.some(a=>a.date===t&&a.type===type));
  });
}

function renderTodayLog(workoutsData, activitiesData) {
  const el = document.getElementById('todayLog');
  const t = today();
  const todayActs = activitiesData.filter(a=>a.date===t);
  const wk = workoutsData[t];
  const hasGym = wk && wk.exercises && Object.keys(wk.exercises).length > 0;
  if(!todayActs.length && !hasGym) { el.innerHTML='<div style="font-size:13px;color:var(--text2);text-align:center;padding:12px">No activity logged today</div>'; return; }
  let html = '';
  if(hasGym) {
    const prog = programs.find(p=>p.id===wk.programId);
    const sets = Object.values(wk.exercises).flat().filter(s=>s.done).length;
    html += `<div class="card" onclick="activeProgram='${wk.programId}';switchPage('Record',1)" style="cursor:pointer"><div style="display:flex;justify-content:space-between"><span>🏋️ ${prog?prog.name:'Workout'}</span><span style="color:var(--green)">${sets} sets ✓</span></div></div>`;
  }
  todayActs.forEach(a => {
    const icon = a.type==='pilates'?'🧘':'🐕';
    html += `<div class="card"><div style="display:flex;justify-content:space-between"><span>${icon} ${a.type.charAt(0).toUpperCase()+a.type.slice(1)}</span><span style="color:var(--text2)">${a.duration?a.duration+'min':''}</span></div>${a.notes?`<div style="font-size:12px;color:var(--text2);margin-top:4px">${a.notes}</div>`:''}</div>`;
  });
  el.innerHTML = html;
}

// --- ACTIVITIES ---
async function logActivity(type) {
  pendingActivityType = type;
  document.getElementById('activityModalTitle').textContent = type==='pilates'?'🧘 Log Pilates':'🐕 Log Dog Walk';
  document.getElementById('actDate').value = today();
  document.getElementById('actDuration').value = type==='pilates'?'50':'30';
  document.getElementById('actNotes').value = '';
  openModal('activityModal');
}
async function saveActivity() {

function checkBluetooth() {
  if(!navigator.bluetooth) document.getElementById('btConnectArea').innerHTML='<div style="font-size:12px;color:var(--text2);margin-bottom:12px">📡 Bluetooth not available. Use Chrome on Android/Mac. Enter values manually.</div>';

async function connectTanita() {
  const status=document.getElementById('btStatus');
  if(!navigator.bluetooth) { status.textContent='Web Bluetooth not supported'; return; }
  try {
    status.textContent='Scanning for Tanita scales...';
    const device=await navigator.bluetooth.requestDevice({ filters:[{namePrefix:'BC'},{namePrefix:'RD'},{namePrefix:'TANITA'}], optionalServices:['0000181b-0000-1000-8000-00805f9b34fb','0000181d-0000-1000-8000-00805f9b34fb'] });
    status.textContent=`Connected to ${device.name}...`;
    const server=await device.gatt.connect();
    try {
      const svc=await server.getPrimaryService('0000181b-0000-1000-8000-00805f9b34fb');
      const ch=await svc.getCharacteristic('00002a9c-0000-1000-8000-00805f9b34fb');
      await ch.startNotifications();
      ch.addEventListener('characteristicvaluechanged', e=>{
        const v=e.target.value; const fat=v.getUint16(2,true)/10;
        document.getElementById('bodyFat').value=fat;
        status.textContent=`📊 ${fat}% body fat`;
      });
      status.textContent=`✅ Connected to ${device.name}. Step on scales.`;
    } catch {
      const svc=await server.getPrimaryService('0000181d-0000-1000-8000-00805f9b34fb');
      const ch=await svc.getCharacteristic('00002a9d-0000-1000-8000-00805f9b34fb');
      await ch.startNotifications();
      ch.addEventListener('characteristicvaluechanged', e=>{
        const v=e.target.value; const w=(v.getUint16(1,true)*0.005).toFixed(1);
        document.getElementById('bodyWeight').value=w;
        status.textContent=`⚖️ ${w}kg`;
      });
      status.textContent=`✅ Connected (weight only). Step on scales.`;
    }
  } catch(err) { status.textContent=err.message.includes('cancel')?'Cancelled':`Failed: ${err.message}`; }
}

async function loadWorkoutForDate() {
  const date=document.getElementById('workoutDate').value;
  const el=document.getElementById('recordList');
  
  if(!exercises.length) exercises = await apiFetch('GET', '/exercises');
  if(!programs.length || !activeProgram) {
    el.innerHTML='<div class="empty"><p>Set up workouts in ⚙️ Setup first</p></div>';
    return;
  }
  
  const prog=programs.find(p=>p.id===activeProgram);
  if(!prog) { el.innerHTML='<div class="empty"><p>Select a workout above</p></div>'; return; }
  
  document.getElementById('recordTitle').textContent=`🏋️ ${prog.name}`;
  
  const progExercises=prog.exerciseIds.map(id=>exercises.find(e=>e.id===id)).filter(Boolean);
  if(!progExercises.length) { el.innerHTML='<div class="empty"><p>No exercises in this workout. Add some in ⚙️ Setup.</p></div>'; return; }
  
  // Load from API into in-memory state
  const workoutsForDate = await apiFetch('GET', `/workouts?date=${date}`);
  const apiData = workoutsForDate[date]?.exercises || {};
  
  currentWorkout = { date, programId: activeProgram, exercises: {} };
  // Initialize all exercises with correct number of sets
  for(const ex of progExercises) {
    const saved = apiData[ex.id];
    if(saved && saved.length > 0) {
      currentWorkout.exercises[ex.id] = saved.map(s => ({weight:s.weight||'', reps:s.reps||'', done:!!s.done}));
      // Pad to at least ex.sets
      while(currentWorkout.exercises[ex.id].length < ex.sets) currentWorkout.exercises[ex.id].push({weight:'',reps:'',done:false});
    } else {
      currentWorkout.exercises[ex.id] = Array.from({length:ex.sets},()=>({weight:'',reps:'',done:false}));
    }
  }
  
  // Fetch previous workouts for all exercises in parallel
  const prevData = await Promise.all(progExercises.map(ex => getPreviousWorkout(ex.id, date)));
  const prevMap = {};
  progExercises.forEach((ex,idx) => { prevMap[ex.id] = prevData[idx]; });
  
  // Store prevMap for re-renders
  currentWorkout._prevMap = prevMap;
  
  renderRecordFromMemory();
}

function renderRecordFromMemory() {
  if(!currentWorkout) return;
  const el=document.getElementById('recordList');
  const prog=programs.find(p=>p.id===activeProgram);
  if(!prog) return;
  const progExercises=prog.exerciseIds.map(id=>exercises.find(e=>e.id===id)).filter(Boolean);
  const prevMap = currentWorkout._prevMap || {};
  
  el.innerHTML = progExercises.map(ex => {
    const sets = currentWorkout.exercises[ex.id] || [];

    return `
    <div class="exercise-record">

      ${ex.notes?`<div class="ex-notes">${ex.notes}</div>`:''}
      ${prev?`<div class="prev-data">Last: <strong>${prev.date}</strong> — ${prev.summary}</div>`:''}
      <div style="display:flex;gap:8px;margin-bottom:6px;padding-left:28px">

        <div class="set-row">

          <input type="number" inputmode="decimal" placeholder="${prev?.sets[Math.min(i,prev.sets.length-1)]?.weight||'kg'}" value="${s.weight}" onchange="updateSet('${ex.id}',${i},'weight',this.value)">
          <input type="number" inputmode="numeric" placeholder="${ex.reps}" value="${s.reps}" onchange="updateSet('${ex.id}',${i},'reps',this.value)">
          <button class="check ${s.done?'done':''}" onclick="toggleSet('${ex.id}',${i},this)">✓</button>
        </div>
      `).join('')}
      <button class="btn-ghost" onclick="addSet('${ex.id}')">+ Add Set</button>
    </div>`;
  }).join('');
}

// === IN-MEMORY WORKOUT STATE ===
// All interactions update this object, then debounce-save to API.
let currentWorkout = null; // { date, programId, exercises: { exId: [{weight,reps,done},...] } }
let saveTimeout = null;

function ensureWorkout(date) {
  if(!currentWorkout || currentWorkout.date !== date) {
    currentWorkout = { date, programId: activeProgram, exercises: {} };
  }
  return currentWorkout;
}

function ensureExSets(exId, minSets) {
  if(!currentWorkout.exercises[exId]) currentWorkout.exercises[exId] = [];
  const arr = currentWorkout.exercises[exId];
  while(arr.length < minSets) arr.push({weight:'',reps:'',done:false});
  return arr;
}

function saveWorkoutDebounced() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    if(!currentWorkout) return;
    try {
      await apiFetch('POST', '/workouts', {
        date: currentWorkout.date,
        programId: currentWorkout.programId,
        exercises: currentWorkout.exercises
      });
    } catch(e) { console.error('Save failed:', e); }
  }, 500);
}

function saveWorkoutNow() {
  clearTimeout(saveTimeout);
  if(!currentWorkout) return;
  return apiFetch('POST', '/workouts', {
    date: currentWorkout.date,
    programId: currentWorkout.programId,
    exercises: currentWorkout.exercises
  });
}

function updateSet(exId, i, field, val) {
  if(!currentWorkout) return;
  ensureExSets(exId, i+1);
  currentWorkout.exercises[exId][i][field] = val;
  saveWorkoutDebounced();
}

function toggleSet(exId, i, btn) {
  if(!currentWorkout) return;
  ensureExSets(exId, i+1);
  const s = currentWorkout.exercises[exId][i];
  s.done = !s.done;
  btn.classList.toggle('done');
  saveWorkoutDebounced();
  if(s.done) startRestTimer(DB.get('restTimer',90));
}

function addSet(exId) {
  if(!currentWorkout) return;
  if(!currentWorkout.exercises[exId]) currentWorkout.exercises[exId] = [];
  currentWorkout.exercises[exId].push({weight:'',reps:'',done:false});
  saveWorkoutDebounced();
  renderRecordFromMemory();
}

async function getPreviousWorkout(exId, beforeDate) {
  try {
    const allWorkouts = await apiFetch('GET', `/workouts?to=${beforeDate}`);
    const dates = Object.keys(allWorkouts).filter(d => d < beforeDate).sort().reverse();
    for(const d of dates) {
      const exData = allWorkouts[d]?.exercises?.[exId];
      if(exData) {
        const sets=exData.filter(s=>s.weight||s.reps);
        if(sets.length) return {date:formatDate(d), sets, summary:sets.map(s=>`${s.weight||0}kg×${s.reps||0}`).join(', ')};
      }
    }
  } catch(e) {}
  return null;
}

async function finishWorkout() {
  if(!currentWorkout) { alert('Nothing recorded!'); return; }
  await saveWorkoutNow();
  const count=Object.values(currentWorkout.exercises||{}).flat().filter(s=>s.done).length;
  alert(`💪 Workout saved! ${count} sets completed.`);
  currentWorkout = null;
  switchPage('Home',0);
}

function renderWeightTrends(workoutsData) {
  const el=document.getElementById('trendsWeights');
  const dates=Object.keys(workoutsData).sort();
  if(!dates.length||!exercises.length) { el.innerHTML='<div class="empty"><p>Complete workouts to see trends</p></div>'; return; }
  el.innerHTML=exercises.map(ex=>{
    const pts=[];
    for(const d of dates) {
      const exData=workoutsData[d]?.exercises?.[ex.id];
      if(exData) {
        const sets=exData.filter(s=>s.weight&&s.done);
        if(sets.length) {
          const maxW=Math.max(...sets.map(s=>parseFloat(s.weight)||0));
          const vol=sets.reduce((sum,s)=>sum+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0);
          pts.push({date:d,maxWeight:maxW,totalVol:vol});
        }
      }
    }
    if(!pts.length) return '';
    const maxVol=Math.max(...pts.map(p=>p.totalVol));
    const first=pts[0].maxWeight,last=pts[pts.length-1].maxWeight,diff=last-first;
    return `<div class="card"><div class="card-title">${ex.name}</div>
      <div class="mini-chart">${pts.slice(-12).map(p=>`<div class="mini-bar" style="height:${Math.max(8,(p.totalVol/maxVol)*100)}%;background:var(--accent)"><div class="tip">${p.maxWeight}</div></div>`).join('')}</div>
      <div class="trend-stats">
        <div class="trend-stat">Current: <span>${last}kg</span></div>
        <div class="trend-stat">Change: <span style="color:${diff>=0?'var(--green)':'var(--accent)'}">${diff>=0?'+':''}${diff}kg</span></div>
        <div class="trend-stat">Sessions: <span>${pts.length}</span></div>
      </div></div>`;
  }).join('')||'<div class="empty"><p>No completed sets yet</p></div>';
}

function renderBodyTrends(bodyMetricsData) {
  const el=document.getElementById('trendsBody');
  if(!bodyMetricsData.length) { el.innerHTML='<div class="empty"><p>Log body metrics to see trends</p></div>'; return; }
  const metrics=[{key:'weight',label:'Weight (kg)',color:'var(--blue)',unit:'kg'},{key:'body_fat',label:'Body Fat %',color:'var(--accent)',unit:'%'},{key:'visceral_fat',label:'Visceral Fat',color:'var(--yellow)',unit:''},{key:'muscle_mass',label:'Muscle Mass (kg)',color:'var(--green)',unit:'kg'}];
  el.innerHTML=metrics.map(m=>{
    const pts=bodyMetricsData.filter(b=>b[m.key]!=null);
    if(pts.length<1) return '';
    const vals=pts.map(p=>p[m.key]);
    const max=Math.max(...vals),min=Math.min(...vals),range=max-min||1;
    const first=vals[0],last=vals[vals.length-1],diff=(last-first).toFixed(1);
    const inv=m.key==='weight'||m.key==='body_fat'||m.key==='visceral_fat';
    const dc=inv?(diff<=0?'var(--green)':'var(--accent)'):(diff>=0?'var(--green)':'var(--accent)');
    return `<div class="card"><div class="card-title">${m.label}</div>
      <div class="mini-chart">${pts.slice(-16).map(p=>{
        const h=Math.max(8,((p[m.key]-min)/range)*100);
        return `<div class="mini-bar" style="height:${h}%;background:${m.color}"><div class="tip">${p[m.key]}</div></div>`;
      }).join('')}</div>
      <div class="trend-stats">
        <div class="trend-stat">Current: <span>${last}${m.unit}</span></div>
        <div class="trend-stat">Change: <span style="color:${dc}">${diff>0?'+':''}${diff}${m.unit}</span></div>
      </div></div>`;
  }).join('');
}

function renderActivityTrends(workoutsData, activitiesData) {
  const el=document.getElementById('trendsActivity');
  const weeks=[]; const now=new Date();
  for(let w=7;w>=0;w--) {
    const start=new Date(now); start.setDate(now.getDate()-((now.getDay()+6)%7)-w*7);
    const end=new Date(start); end.setDate(start.getDate()+6);
    const ss=start.toISOString().split('T')[0], es=end.toISOString().split('T')[0];
    const gym=Object.keys(workoutsData).filter(d=>d>=ss&&d<=es&&workoutsData[d]?.exercises&&Object.keys(workoutsData[d].exercises).length>0).length;
    const pilates=activitiesData.filter(a=>a.date>=ss&&a.date<=es&&a.type==='pilates').length;
    const walks=activitiesData.filter(a=>a.date>=ss&&a.date<=es&&a.type==='walk').length;
    weeks.push({label:formatDate(ss),gym,pilates,walks});
  }
  el.innerHTML=`<div class="card"><div class="card-title">Weekly Activity (8 weeks)</div>
    ${weeks.map(w=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #222">
      <div style="width:40px;font-size:11px;color:var(--text2)">${w.label}</div>
      <div style="flex:1;display:flex;gap:4px">
        ${Array(w.gym).fill('<span style="display:inline-block;width:20px;height:16px;background:var(--accent);border-radius:3px" title="Gym">🏋️</span>').join('')}
        ${Array(w.pilates).fill('<span style="display:inline-block;width:20px;height:16px;background:var(--purple);border-radius:3px" title="Pilates">🧘</span>').join('')}
        ${Array(w.walks).fill('<span style="display:inline-block;width:20px;height:16px;background:var(--green);border-radius:3px" title="Walk">🐕</span>').join('')}
        ${!w.gym&&!w.pilates&&!w.walks?'<span style="font-size:11px;color:#555">—</span>':''}
      </div></div>`).join('')}
    <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--text2)"><span>🏋️ Gym</span><span>🧘 Pilates</span><span>🐕 Walk</span></div></div>`;
}

// --- OURA ---
// OURA_BASE is no longer used, API calls now go through Railway proxy
const OURA_API_PREFIX = '/oura'; // This will be appended to API_URL

async function renderOuraHome() {
  const el = document.getElementById('ouraHome');
  el.innerHTML = '<div style="text-align:center;color:var(--text2);font-size:13px;padding:8px">Loading Oura data...</div>';
  
  const t = today();
  const weekAgo = new Date(new Date().setDate(new Date().getDate()-7)).toISOString().split('T')[0];
  
  const [sleepData, readinessData, activityData] = await Promise.all([
    apiFetch('GET', `${OURA_API_PREFIX}/daily_sleep?start_date=${weekAgo}&end_date=${t}`),
    apiFetch('GET', `${OURA_API_PREFIX}/daily_readiness?start_date=${weekAgo}&end_date=${t}`),
    apiFetch('GET', `${OURA_API_PREFIX}/daily_activity?start_date=${weekAgo}&end_date=${t}`)
  ]);
  
  const sleep = sleepData?.data?.slice(-1)[0];
  const readiness = readinessData?.data?.slice(-1)[0];
  const activity = activityData?.data?.slice(-1)[0];
  
  if(!sleep && !readiness && !activity) {
    el.innerHTML = '<div class="card" style="text-align:center;color:var(--text2);font-size:13px">⌚ Oura: no data today yet</div>';
    return;
  }
  
  const scoreColor = (s) => s >= 85 ? 'var(--green)' : s >= 70 ? 'var(--yellow)' : 'var(--accent)';
  const scoreRing = (score, label, emoji) => {
    if(!score) return '';
    return `<div class="metric-card">
      <div class="value" style="color:${scoreColor(score)}">${score}</div>
      <div class="label">${emoji} ${label}</div>
    </div>`;
  };
  
  const latestDay = sleep?.day || readiness?.day || '';
  let html = `<h2>⌚ Oura Ring ${latestDay ? '<span style="font-size:13px;color:var(--text2)">(' + formatDate(latestDay) + ')</span>' : ''}</h2><div class="metric-grid">`;
  html += scoreRing(sleep?.score, 'Sleep', '😴');
  html += scoreRing(readiness?.score, 'Readiness', '⚡');
  
  if(readiness?.contributors) {
    const c = readiness.contributors;
    html += `<div class="metric-card"><div class="value">${c.resting_heart_rate || '—'}</div><div class="label">❤️ Resting HR</div></div>`;
    html += `<div class="metric-card"><div class="value">${c.hrv_balance || '—'}</div><div class="label">📊 HRV Balance</div></div>`;
  }
  html += '</div>';
  
  // Low readiness warning
  if(readiness?.score && readiness.score < 70) {
    html += `<div class="card" style="border-left:3px solid var(--accent);padding:12px">
      <div style="font-size:14px;font-weight:600;color:var(--accent)">⚠️ Low Readiness (${readiness.score})</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">Consider a lighter session today or active recovery.</div>
    </div>`;
  }
  
  // Sleep details
  if(sleep?.contributors) {
    const c = sleep.contributors;
    html += `<div class="card"><div class="card-title">😴 Sleep Breakdown</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:12px">
        <span style="color:var(--text2)">Deep: <strong style="color:${scoreColor(c.deep_sleep)}">${c.deep_sleep}</strong></span>
        <span style="color:var(--text2)">REM: <strong style="color:${scoreColor(c.rem_sleep)}">${c.rem_sleep}</strong></span>
        <span style="color:var(--text2)">Efficiency: <strong style="color:${scoreColor(c.efficiency)}">${c.efficiency}</strong></span>
        <span style="color:var(--text2)">Restfulness: <strong style="color:${scoreColor(c.restfulness)}">${c.restfulness}</strong></span>
      </div></div>`;
  }
  
  el.innerHTML = html;
}

async function renderOuraTrends() {
  const el = document.getElementById('trendsOura');
  if(!el) return;
  el.innerHTML = '<div style="text-align:center;color:var(--text2);font-size:13px;padding:16px">Loading Oura trends...</div>';
  
  const end = today();
  const start = new Date(new Date().setDate(new Date().getDate()-30)).toISOString().split('T')[0];
  
  const [sleepData, readinessData] = await Promise.all([
    apiFetch('GET', `${OURA_API_PREFIX}/daily_sleep?start_date=${start}&end_date=${end}`),
    apiFetch('GET', `${OURA_API_PREFIX}/daily_readiness?start_date=${start}&end_date=${end}`)
  ]);
  
  if(!sleepData?.data?.length && !readinessData?.data?.length) {
    el.innerHTML = '<div class="empty"><p>No Oura data available</p></div>';
    return;
  }
  
  let html = '';
  
  // Sleep score trend
  if(sleepData?.data?.length) {
    const pts = sleepData.data;
    const vals = pts.map(p=>p.score).filter(Boolean);
    const max = Math.max(...vals), min = Math.min(...vals), range = max-min||1;
    const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
    const scoreColor = (s) => s >= 85 ? 'var(--green)' : s >= 70 ? 'var(--yellow)' : 'var(--accent)';
    
    html += `<div class="card"><div class="card-title">😴 Sleep Score (30 days)</div>
      <div class="mini-chart">${pts.slice(-30).map(p=>{
        const h = p.score ? Math.max(8,((p.score-min)/range)*100) : 0;
        return `<div class="mini-bar" style="height:${h}%;background:${scoreColor(p.score)}"><div class="tip">${p.score||''}</div></div>`;
      }).join('')}</div>
      <div class="trend-stats">
        <div class="trend-stat">Average: <span>${avg}</span></div>
        <div class="trend-stat">Latest: <span>${vals[vals.length-1]}</span></div>
      </div></div>`;
  }
  
  // Readiness score trend
  if(readinessData?.data?.length) {
    const pts = readinessData.data;
    const vals = pts.map(p=>p.score).filter(Boolean);
    const max = Math.max(...vals), min = Math.min(...vals), range = max-min||1;
    const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
    const scoreColor = (s) => s >= 85 ? 'var(--green)' : s >= 70 ? 'var(--yellow)' : 'var(--accent)';
    
    html += `<div class="card"><div class="card-title">⚡ Readiness Score (30 days)</div>
      <div class="mini-chart">${pts.slice(-30).map(p=>{
        const h = p.score ? Math.max(8,((p.score-min)/range)*100) : 0;
        return `<div class="mini-bar" style="height:${h}%;background:${scoreColor(p.score)}"><div class="tip">${p.score||''}</div></div>`;
      }).join('')}</div>
      <div class="trend-stats">
        <div class="trend-stat">Average: <span>${avg}</span></div>
        <div class="trend-stat">Latest: <span>${vals[vals.length-1]}</span></div>
      </div></div>`;
  }
  
  el.innerHTML = html;
}

// --- UTILS ---
function formatDate(d) { const[y,m,day]=d.split('-'); return `${parseInt(day)}/${parseInt(m)}`; }
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{ if(e.target===bg) bg.classList.remove('show'); }));

// Init
document.getElementById('restTimerSetting').value=DB.get('restTimer',90);
renderHome();
